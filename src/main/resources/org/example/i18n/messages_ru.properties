command.add=add - добавляет новый элемент в коллекцию
command.show=show - показывает все маршруты
command.info=info - показывает информацию о коллекции
command.update=update {id} - обновляет маршрут по ID
command.remove_by_id=remove_by_id {id} - удаляет маршрут по ID
command.remove_first=remove_first - удаляет первый маршрут
command.remove_all_by_distance=remove_all_by_distance {distance} - удаляет маршруты с заданной дистанцией
command.clear=clear - очищает коллекцию
command.filter_less_than_distance=filter_less_than_distance {distance} - показывает маршруты с дистанцией меньше заданной
command.average_of_distance=average_of_distance - вычисляет среднюю дистанцию
command.execute_script=execute_script {filename} - выполняет скрипт из файла
command.help=help - показывает справку по командам
command.history=history - показывает историю команд
command.logout=logout - выходит из системы
command.add_if_max=add_if_max - добавляет новый элемент в коллекцию если он больше наибольшего